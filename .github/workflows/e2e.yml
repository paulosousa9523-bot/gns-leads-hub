name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run E2E suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      E2E_VENDOR_EMAIL: ${{ secrets.E2E_VENDOR_EMAIL }}
      E2E_VENDOR_NAME: ${{ secrets.E2E_VENDOR_NAME }}
      E2E_GESTOR_EMAIL: ${{ secrets.E2E_GESTOR_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify required secrets
        run: |
          missing=0
          for var in VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run E2E suite
        run: bun run test:e2e
